"$schema" = "./node_modules/wrangler/config-schema.json"
name = "retail-pos-enterprise"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-04-09"
compatibility_flags = ["nodejs_compat"]

[vars]
JWT_SECRET = "dev-next-pos-jwt-secret"
EMAIL_TRANSPORT = "mock"
LOW_STOCK_REPORT_FROM = "alerts@retail-pos.example"
LOW_STOCK_REPORT_TO = "ops@retail-pos.example"
RESEND_API_BASE_URL = "https://api.resend.com"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[triggers]
crons = ["0 */6 * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "retail-pos-enterprise"
database_id = "7091e204-839b-41c0-bdf2-e1d4211de02c"

[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "retail-pos-product-images"
